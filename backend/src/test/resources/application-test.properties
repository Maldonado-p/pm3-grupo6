# Configurań§es do H2 para testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console
spring.h2.console.enabled=false

# Configurań§es gerais
spring.main.allow-bean-definition-overriding=true
spring.jpa.defer-datasource-initialization=false

# Configurań§es para resolver problemas de serializańŃo (iguais ao production)
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Otimizań§es de desempenho para carregamento de relacionamentos
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ConfigurańŃo avanńada de serializańŃo
spring.jackson.serialization.write-single-elem-arrays-unwrapped=false
spring.jackson.deserialization.READ_UNKNOWN_ENUM_VALUES_USING_DEFAULT_VALUE=true

# Logging reduzido para testes
logging.level.org.springframework=WARN
logging.level.app.zad.zadinventory=INFO
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=OFF