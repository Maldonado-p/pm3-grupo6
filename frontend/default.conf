# chance access to any other virtualhost

server {
    listen 80;
    server_name sistema1.net sistema2.net;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name sistema1.net sistema2.net;
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/wildcard.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /api/ {
        proxy_pass https://192.168.100.17:8443/api/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /realms/ {
        proxy_pass http://192.168.100.15:8080/realms/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /resources/ {
	proxy_pass http://192.168.100.15:8080/resources/;
	proxy_set_header Host $host;
	proxy_set_header X-Forwarded-Proto https;
    }
    location /js/ {
	proxy_pass http://192.168.100.15:8080/js/;
	proxy_set_header Host $host;
	proxy_set_header X-Forwarded-Proto https;
}
}
